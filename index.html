<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roue FAQ – CNPR</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <img src="image.png" id="logoURSSAF" alt="Logo URSSAF">
        <h1>Roue FAQ – CNPR Centre‑Val de Loire</h1>
    </header>

    <div id="scoreboard">
        <div class="player" id="p1">Joueur 1 : <span>0</span></div>
        <div class="player" id="p2">Joueur 2 : <span>0</span></div>
        <div class="player" id="p3">Joueur 3 : <span>0</span></div>
        <div class="player" id="p4">Joueur 4 : <span>0</span></div>
    </div>

    <div id="turnDisplay">Tour du Joueur 1</div>

    <div id="modeButtons">
        <button onclick="setMode('normal')">Mode Normal</button>
        <button onclick="setMode('double')">Mode Double Points</button>
    </div>

    <div id="wheelContainer">
        <div id="arrow">▼</div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <button id="spinButton" onclick="spinWheel()">🎡 Lancer la roue</button>
    <button id="restartButton" onclick="restartGame()">🔁 Rejouer</button>

    <div id="questionBox">
        <div id="questionText"></div>
        <div id="hintText"></div>
        <div id="timer"></div>
        <div id="answerBox"></div>

        <div id="validationBox" style="display:none;">
            <p>Est‑ce que le joueur a trouvé la bonne réponse ?</p>
            <button onclick="validateAnswer(true)">Oui</button>
            <button onclick="validateAnswer(false)">Non</button>
        </div>
    </div>

    <div id="endScreen" style="display:none;">
        <h2>🎉 Fin de la partie !</h2>
        <h3>Classement final :</h3>
        <div id="ranking"></div>
        <button onclick="restartGame()">🔁 Rejouer</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
