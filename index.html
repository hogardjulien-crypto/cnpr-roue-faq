<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roue FAQ CNPR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<img src="image.png" id="urssafLogo">

    <h1>🎡 Roue FAQ – CNPR Centre‑Val de Loire</h1>

    <div id="teams">
        <div class="team" id="team0">Équipe 1</div>
        <div class="team" id="team1">Équipe 2</div>
        <div class="team" id="team2">Équipe 3</div>
    </div>

    <div id="scores"></div>
    <div id="timer"></div>

    <div id="wheel-container">
        <canvas id="wheel" width="500" height="500"></canvas>
        <div id="cursor">▼</div>
    </div>

    <button id="spinBtn">🎯 Lancer la roue</button>

    <div id="questionBox">
        <h2 id="questionText"></h2>
    </div>

    <!-- POPUP DOUBLE POINTS -->
    <div id="doublePopup" class="popup hidden">
        <p>Souhaites‑tu activer le mode DOUBLE POINTS pour cette question ?</p>
        <button id="doubleYes">Oui</button>
        <button id="doubleNo">Non</button>
    </div>

    <!-- POPUP VALIDATION -->
    <div id="answerPopup" class="popup hidden">
        <p>L’équipe a‑t‑elle trouvé la bonne réponse ?</p>
        <button id="answerYes">Oui</button>
        <button id="answerNo">Non</button>
    </div>

    <!-- POPUP PASSAGE ÉQUIPE -->
    <div id="nextTeamPopup" class="popup hidden">
        <p>L’équipe a terminé. Passer à l’équipe suivante ?</p>
        <button id="nextTeamYes">Oui</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
