<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Roue FAQ Paie & RH - CNPR</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/URSSAF_logo_2022.svg" class="logo">

<h1>🎡 Roue FAQ Paie & RH — CNPR</h1>

<div id="scoreboard">
    <div class="player">Joueur 1 : <span id="p1">0</span></div>
    <div class="player">Joueur 2 : <span id="p2">0</span></div>
    <div class="player">Joueur 3 : <span id="p3">0</span></div>
    <div class="player">Joueur 4 : <span id="p4">0</span></div>
</div>

<div class="mode-container">
    <button onclick="setMode('normal')" class="mode-btn">Mode Normal</button>
    <button onclick="setMode('duel')" class="mode-btn">Mode Duel</button>
    <button onclick="setMode('double')" class="mode-btn">Double Points</button>
</div>

<div id="arrow"></div>
<div id="wheel"></div>

<button onclick="spin()">🎯 Lancer la roue</button>

<div id="hint"></div>
<div id="result"></div>
<div id="answer"></div>

<h2>📱 Accès mobile</h2>
<p>Scannez ce QR code pour ouvrir la roue sur votre smartphone :</p>

<div id="qrcode"></div>

<audio id="sound-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="sound-spin" src="https://www.soundjay.com/mechanical/sounds/mechanical-gear-1.mp3"></audio>
<audio id="sound-ding" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
